interface:
  display_name: "Figma Implement Design (Cache-First)"
  short_description: "Design-to-code with cache-first MCP and 429 asset fallback"
  default_prompt: "Implement the Figma design using cache-first MCP calls; if asset downloads hit 429, export missing assets via agent-browser."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
